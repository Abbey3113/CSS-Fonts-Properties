<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <title>CSS Properties</title>
  <style>
    body {
      background-color: cornflowerblue;
      color: white;
      font-size: 18px;
    }


    
  </style>
  <style>
    .color{
      color: coral;
    }
    .size{
     font-size: 2rem; 
    }
    .weight{
      font-weight: 900;
    }
    .family{
      font-family: "caveat",cursive ;
      font-weight: 400;
    }
    .align{
      text-align: right;
    }
    html{
      font-size: 30px;
    }
  </style>
  <link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Caveat:wght@400..700&family=Roboto:ital,wght@0,100..900;1,100..900&display=swap" rel="stylesheet">
</head>

<body>
  <h1>Important CSS Properties</h1>
  <p class="color">Color</p>
  <p class="size">Font Size</p>
  <p class="weight">Font Weight</p>
  <p class="family">Font Family</p>
  <p class="align">Text Align</p>
</body>

</html>
